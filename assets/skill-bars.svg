<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF7A00"/>
      <stop offset="100%" style="stop-color:#00C853"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="#0D1117" rx="10"/>
  <rect x="1" y="1" width="798" height="298" fill="none" stroke="#FF7A00" stroke-width="1.5" rx="9" opacity="0.6"/>
  <text x="400" y="35" text-anchor="middle" font-family="monospace" font-size="16" fill="#FF7A00" font-weight="bold">⚡ Skill Proficiency</text>

  <!-- Network Security 95% -->
  <text x="20" y="68" font-family="monospace" font-size="13" fill="#FFFFFF">🔒 Network Security</text>
  <text x="780" y="68" text-anchor="end" font-family="monospace" font-size="13" fill="#00C853">95%</text>
  <rect x="20" y="74" width="760" height="14" fill="#161B22" rx="7"/>
  <rect x="20" y="74" width="0" height="14" fill="url(#g)" rx="7">
    <animate attributeName="width" from="0" to="722" dur="1.5s" begin="0.2s" fill="freeze"/>
  </rect>

  <!-- Cloud Architecture 85% -->
  <text x="20" y="116" font-family="monospace" font-size="13" fill="#FFFFFF">☁️  Cloud Architecture</text>
  <text x="780" y="116" text-anchor="end" font-family="monospace" font-size="13" fill="#00C853">85%</text>
  <rect x="20" y="122" width="760" height="14" fill="#161B22" rx="7"/>
  <rect x="20" y="122" width="0" height="14" fill="url(#g)" rx="7">
    <animate attributeName="width" from="0" to="646" dur="1.5s" begin="0.5s" fill="freeze"/>
  </rect>

  <!-- DevSecOps 80% -->
  <text x="20" y="164" font-family="monospace" font-size="13" fill="#FFFFFF">🚀 DevSecOps</text>
  <text x="780" y="164" text-anchor="end" font-family="monospace" font-size="13" fill="#00C853">80%</text>
  <rect x="20" y="170" width="760" height="14" fill="#161B22" rx="7"/>
  <rect x="20" y="170" width="0" height="14" fill="url(#g)" rx="7">
    <animate attributeName="width" from="0" to="608" dur="1.5s" begin="0.8s" fill="freeze"/>
  </rect>

  <!-- Penetration Testing 75% -->
  <text x="20" y="212" font-family="monospace" font-size="13" fill="#FFFFFF">🎯 Penetration Testing</text>
  <text x="780" y="212" text-anchor="end" font-family="monospace" font-size="13" fill="#00C853">75%</text>
  <rect x="20" y="218" width="760" height="14" fill="#161B22" rx="7"/>
  <rect x="20" y="218" width="0" height="14" fill="url(#g)" rx="7">
    <animate attributeName="width" from="0" to="570" dur="1.5s" begin="1.1s" fill="freeze"/>
  </rect>

  <!-- Web Development 70% -->
  <text x="20" y="260" font-family="monospace" font-size="13" fill="#FFFFFF">💻 Web Development</text>
  <text x="780" y="260" text-anchor="end" font-family="monospace" font-size="13" fill="#00C853">70%</text>
  <rect x="20" y="266" width="760" height="14" fill="#161B22" rx="7"/>
  <rect x="20" y="266" width="0" height="14" fill="url(#g)" rx="7">
    <animate attributeName="width" from="0" to="532" dur="1.5s" begin="1.4s" fill="freeze"/>
  </rect>
