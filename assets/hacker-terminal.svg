<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220">
  <style>
    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    .cur { animation: blink 1s infinite; }
  </style>
  <rect width="800" height="220" fill="#0D1117" rx="10"/>
  <rect x="1" y="1" width="798" height="218" fill="none" stroke="#FF7A00" stroke-width="1.5" rx="9" opacity="0.7"/>
  <rect x="1" y="1" width="798" height="32" fill="#161B22" rx="9"/>
  <rect x="1" y="17" width="798" height="16" fill="#161B22"/>
  <circle cx="22" cy="17" r="6" fill="#FF5F57"/>
  <circle cx="42" cy="17" r="6" fill="#FEBC2E"/>
  <circle cx="62" cy="17" r="6" fill="#28C840"/>
  <text x="400" y="22" text-anchor="middle" font-family="monospace" font-size="12" fill="#8B949E">root@mr-reagen: ~/security</text>
  <g font-family="'Courier New',monospace" font-size="13">
    <text x="20" y="62" fill="#FF7A00" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.1s" fill="freeze"/>
      $ nmap -sV -sC -p- 192.168.1.0/24
    </text>
    <text x="20" y="82" fill="#00C853" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.0s" dur="0.1s" fill="freeze"/>
      [*] Starting Nmap 7.94 | Host discovery in progress...
    </text>
    <text x="20" y="102" fill="#FFFFFF" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.1s" fill="freeze"/>
      PORT      STATE  SERVICE    VERSION
    </text>
    <text x="20" y="122" fill="#FF7A00" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.3s" dur="0.1s" fill="freeze"/>
      22/tcp    open   ssh        OpenSSH 8.9p1
    </text>
    <text x="20" y="142" fill="#FF7A00" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.7s" dur="0.1s" fill="freeze"/>
      443/tcp   open   https      nginx 1.24.0
    </text>
    <text x="20" y="162" fill="#00C853" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.2s" dur="0.1s" fill="freeze"/>
      [+] Scan complete — 0 critical vulnerabilities found ✓
    </text>
    <text x="20" y="192" fill="#FF7A00" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="4.0s" dur="0.1s" fill="freeze"/>
      $ <tspan fill="#00C853">whoami</tspan>
    </text>
    <text x="20" y="210" fill="#FFFFFF" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="4.6s" dur="0.1s" fill="freeze"/>
      mr-reagen — IT Security Manager 🛡️
    </text>
  </g>
  <rect x="20" y="196" width="8" height="14" fill="#00C853" class="cur" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="4.6s" dur="0.1s" fill="freeze"/>
  </rect>
</svg>
