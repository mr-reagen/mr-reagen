name: Metrics
on:
  push:
    branches: ["master", "main"]
  schedule:
    # Runs daily at 00:30 UTC to avoid peak-hour rate limits
    - cron: "30 0 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@3.34
        with:
          # Use a Personal Access Token (PAT) stored as METRICS_TOKEN secret.
          # GITHUB_TOKEN does NOT have enough permissions for most plugins.
          # Go to: Settings > Secrets > Actions > New repository secret
          # Name: METRICS_TOKEN  |  Value: your PAT with read:user, repo, read:org scopes
          token: ${{ secrets.METRICS_TOKEN }}

          # Output
          filename: github-metrics.svg
          output_action: commit
          committer_message: "chore: update github metrics [skip ci]"

          # Options
          user: mr-reagen
          template: classic
          base: header, community, repositories, metadata
          config_timezone: Asia/Kathmandu

          # Plugin: Languages
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8

          # Plugin: Habits
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # Plugin: Followup
          plugin_followup: yes
          plugin_followup_sections: repositories, user

          # Plugin: Lines
          plugin_lines: yes

          # NOTE: plugin_achievements is DISABLED.
          # It crashes because GitHub deprecated the "Projects Classic" API
          # that the achievements plugin depends on. Re-enable only when fixed upstream.
          # plugin_achievements: yes
